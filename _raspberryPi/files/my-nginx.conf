##
server {
	listen 80;
	listen [::]:80;

	server_name organsapp.com www.organsapp.com;

	#change folder for your user folder
	root $HOME/frontend/dist;
	index index.html;

	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
		try_files $uri $uri/ /index.html;
	}
	location /api/ {
		proxy_pass http://10.20.20.20:3000/;
		proxy_http_version 1.1;
	}
}